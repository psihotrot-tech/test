</header>
<div class="progress-bar-wrap">

<script>

{

    { q:"Prema sredini iz koje potiču, ribe se dele na:", options:["a) Morske, rečne i jezerske","b) Morske, slatkovodne, prolazne i ribe bočastih voda","c) Plavu i belu ribu","d) Masnu, polumasnu i nemasnu"], a:"b) Morske, slatkovodne, prolazne i ribe bočastih voda" },

    { q:"Ribe dna (bentonske ribe) su npr.:", options:["a) Sardela i skuša","b) Bakalar i oslić","c) Haringa i inćun","d) Tuna i palamida"], a:"b) Bakalar i oslić" },
    { q:"Slatkovodne ribe koje žive u tekućim vodama su:", options:["a) Ukljeva i karaš","b) Štuka i grgeč","c) Pastrmka i manić","d) Deverika i linjak"], a:"c) Pastrmka i manić" },
    { q:"Koje ribe žive i u tekućim i u stajaćim vodama:", options:["a) Pastrmka i manić","b) Ukljeva i karaš","c) Štuka i grgeč","d) Šaran i smuđ"], a:"c) Štuka i grgeč" },
    { q:"'Prolazne' ribe su one koje:", options:["a) Žive samo u moru","b) Žive samo u slatkim vodama","c) Žive delom u slanim a delom u slatkim vodama","d) Žive u bočastim vodama"], a:"c) Žive delom u slanim a delom u slatkim vodama" },
    { q:"Jesetra i moruna su primeri 'prolaznih' riba jer:", options:["a) Žive u moru a ikre se u slatkim vodama","b) Žive u slatkoj vodi a ikre se u moru","c) Migriraju između dva mora","d) Žive isključivo u bočastim vodama"], a:"a) Žive u moru a ikre se u slatkim vodama" },
    { q:"Jegulja je primer 'prolazne' ribe jer:", options:["a) Živi u moru a ikre se u slatkoj vodi","b) Ikre se u moru a živi na ušćima reka","c) Živi podjednako u moru i slatkoj vodi","d) Nikad ne migrira"], a:"b) Ikre se u moru a živi na ušćima reka" },
    { q:"Pod pojmom 'pecatura' podrazumeva se:", options:["a) Lakoća pecanja ribe","b) Zastupljenost ribe na tržištu","c) Broj riba u jednom kilogramu","d) Poreklo riba"], a:"c) Broj riba u jednom kilogramu" },
    { q:"Morska riba se razvrstava u koliko grupa:", options:["a) Tri grupe","b) Četiri grupe","c) Pet grupa","d) Šest grupa"], a:"c) Pet grupa" },
    { q:"Koje su pet grupa morske ribe:", options:["a) Masna, nemasna, polumasna, bela i mešana","b) Sitna plava, krupna plava, bela, landovina i mešana morska riba","c) Pučinska, bentonska, dubinska, slatkovodna i bočasta","d) Prva, druga, treća, četvrta i peta kategorija"], a:"b) Sitna plava, krupna plava, bela, landovina i mešana morska riba" },
    { q:"Ribe bočastih voda žive:", options:["a) U čistim planinskim rekama","b) U dubokim morima","c) U manje slanim delovima mora, ušćima i donjim tokovima reka","d) Isključivo u jezerima"], a:"c) U manje slanim delovima mora, ušćima i donjim tokovima reka" },
    { q:"U sitnu plavu ribu se ubrajaju:", options:["a) Tuna, palamida i iglun","b) Inćun, skuša, sardela, šnjur i haringa","c) Oslić, bakalar i list","d) Jastog, škamp i kozica"], a:"b) Inćun, skuša, sardela, šnjur i haringa" },

    { q:"Mešana morska riba obuhvata:", options:["a) Samo belu ribu manje mase","b) Mešavinu sitne plave, bele, landovine, glavonožaca i sitnih rakova koji ne ispunjavaju uslove kategorije","c) Isključivo krupnu plavu ribu","d) Samo slatkovodne ribe"], a:"b) Mešavinu sitne plave, bele, landovine, glavonožaca i sitnih rakova koji ne ispunjavaju uslove kategorije" },

    { q:"U mešanu morsku ribu spada i:", options:["a) Tuna i iglun","b) Oslić i bakalar","c) Škupunada, brodet i jestivi priliv","d) Jesetra i moruna"], a:"c) Škupunada, brodet i jestivi priliv" },
    { q:"U landovinu se ubrajaju:", options:["a) Sardela, inćun i skuša","b) Tuna, palamida i luc","c) Drhtulja, raža, kostelj, mačka i pas mekuš","d) Oslić, list i lovrata"], a:"c) Drhtulja, raža, kostelj, mačka i pas mekuš" },

  ]
},
{
  title: "Test 2 – Svežina ribe i konkretne vrste",

    { q:"Koji je PRVI indikator svežine ribe koji se koristi pri prijemu:", options:["a) Boja krljušti","b) Miris – riba treba da ima čist, svež miris","c) Boja peraja","d) Težina ribe"], a:"b) Miris – riba treba da ima čist, svež miris" },
    { q:"Koža sveže ribe treba da bude:", options:["a) Suva i mat","b) Klizava (glatka) i vlažna","c) Hrapava i tvrda","d) Ljuskava i tvrda"], a:"b) Klizava (glatka) i vlažna" },
    { q:"Krljušt sveže ribe treba da bude:", options:["a) Lako odvojiva od tela","b) Čvrsto prilegnuta uz telo ribe","c) Suva i lomljiva","d) Potpuno odsutna"], a:"b) Čvrsto prilegnuta uz telo ribe" },
    { q:"Oči sveže ribe treba da budu:", options:["a) Mutne i udubljene u glavu","b) Jasne i čitave","c) Crne i sjajne","d) Sive i zamagljene"], a:"b) Jasne i čitave" },
    { q:"Škrge sveže ribe treba da budu:", options:["a) Sive i suhe","b) Braon boje i suhe","c) Crvene ili kestenjaste boje, vlažne i svežeg izgleda","d) Bele boje i bez mirisa"], a:"c) Crvene ili kestenjaste boje, vlažne i svežeg izgleda" },

    { q:"Oslić ima meso koje je:", options:["a) Masno i tamno","b) Mekano, ukusno i cenjeno, sa malom količinom masti","c) Tvrdo i suvo","d) Crveno i jako masno"], a:"b) Mekano, ukusno i cenjeno, sa malom količinom masti" },
    { q:"Bakalar se u srpskoj gastronomiji koristi kao:", options:["a) Sveža riba za roštilj","b) Sušena riba koja se u vodi rehidrira i omekšava","c) Zamrznuta riba","d) Dimljena riba"], a:"b) Sušena riba koja se u vodi rehidrira i omekšava" },
    { q:"List (švoja, tabinja) je riba koja:", options:["a) Ima meso osrednjeg kvaliteta","b) Ima meso izuzetnog kvaliteta i priprema se na razne načine","c) Koristi se isključivo za riblji fond","d) Nije jestiva"], a:"b) Ima meso izuzetnog kvaliteta i priprema se na razne načine" },
    { q:"Gof-orhan je riba koja:", options:["a) Ima tvrdo i neukusno meso","b) Se uvek svrstava u drugu klasu","c) Ima belo, mekano i veoma ukusno meso i uvek se svrstava samo u prvu klasu","d) Se industrijski prerađuje"], a:"c) Ima belo, mekano i veoma ukusno meso i uvek se svrstava samo u prvu klasu" },
    { q:"Tuna (tunj) pripada grupi:", options:["a) Bele ribe","b) Landovine","c) Sitne plave ribe","d) Krupne plave ribe"], a:"d) Krupne plave ribe" },
    { q:"Sardele imaju veliki privredni značaj jer:", options:["a) Imaju najmanje masti od svih riba","b) Sadrže preko 13% masti i koriste se sveže, usoljene i konzervisane","c) Žive najduže od svih riba","d) Imaju najmanje kostiju"], a:"b) Sadrže preko 13% masti i koriste se sveže, usoljene i konzervisane" },
    { q:"Skuša se u ugostiteljstvu najčešće nalazi kao:", options:["a) Isključivo sveža, sirova riba","b) Sveža, marinirana, dimljena, usoljena i konzervirana","c) Samo dimljena","d) Samo konzervisana"], a:"b) Sveža, marinirana, dimljena, usoljena i konzervirana" },
    { q:"Grdobina (žaba) je riba od koje se koristi:", options:["a) Cela riba sa glavom","b) Samo meso iz repnog dela, jer ima izrazito veliku glavu","c) Samo jetra","d) Samo ikra"], a:"b) Samo meso iz repnog dela, jer ima izrazito veliku glavu" },

    { q:"Rečna jegulja ima:", options:["a) Suvo i neukusno meso","b) Otrovno meso koje se ne sme koristiti","c) Nežno, masno i ukusno meso, ali ima otrovnu krv pa treba odmah iskrvariti","d) Meso bez ikakve masnoće"], a:"c) Nežno, masno i ukusno meso, ali ima otrovnu krv pa treba odmah iskrvariti" },
    { q:"Smuđ ima:", options:["a) Crveno i masno meso","b) Veoma ukusno belo meso","c) Tvrdo i neukusno meso","d) Meso sa puno kostiju"], a:"b) Veoma ukusno belo meso" },
    { q:"Som koji je mlad ima:", options:["a) Žilavije meso koje se oseća na mulj","b) Veoma ukusno, čvrsto i masno meso","c) Neukusno i suvo meso","d) Meso bez ikakve vrednosti"], a:"b) Veoma ukusno, čvrsto i masno meso" },
    { q:"Lubin (brancin) ima meso koje je:", options:["a) Neukusno i suvo","b) Veoma cenjeno","c) Osrednjeg kvaliteta","d) Pogodno samo za konzervisanje"], a:"b) Veoma cenjeno" },
  ]

{
  title: "Test 3 – Jesetre, pastrmke i šaranske ribe",
  questions: [
    { q:"Jesetre su ribe koje imaju:", options:["a) Koštani skelet","b) Hrskavičav skelet","c) Ljuski bez krljušti","d) Meko telo bez skeleta"], a:"b) Hrskavičav skelet" },

{

let currentTest = 0;
let answered = new Array(TESTS.length).fill(false);
let scores = new Array(TESTS.length).fill(null);

function renderGrid() {
  const grid = document.getElementById('testGrid');
  grid.innerHTML = '';
  TESTS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'test-btn' + (i === currentTest ? ' active' : '') + (answered[i] ? ' done' : '');
    btn.textContent = `Test ${i+1}`;
    btn.onclick = () => { currentTest = i; renderGrid(); renderTest(); };
    grid.appendChild(btn);
  });
  document.getElementById('progressLabel').textContent = `Test ${currentTest+1} od ${TESTS.length}`;
  const pct = ((currentTest) / TESTS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderTest() {
  const t = TESTS[currentTest];
  const area = document.getElementById('testArea');
  let html = `<h2 style="color:var(--gold);font-size:1.1rem;margin-bottom:24px;letter-spacing:0.03em">${t.title}</h2>`;
  t.questions.forEach((q, qi) => {
    html += `<div class="question-block" id="qblock-${qi}">
      <div class="question-num">PITANJE ${qi+1} OD ${t.questions.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options" id="opts-${qi}">`;
    q.options.forEach((opt, oi) => {
      html += `<label class="option-label" id="opt-${qi}-${oi}">
        <input type="radio" name="q${qi}" value="${opt}"> ${opt}
      </label>`;
    });
    html += `</div></div><hr class="divider">`;
  });
  html += `<div class="btn-row">
    <button class="btn btn-gold" onclick="submitTest()">Proveri odgovore</button>
    <button class="btn btn-outline" onclick="resetTest()">Resetuj test</button>
  </div>
  <div id="resultBox"></div>`;
  area.innerHTML = html;
  window.scrollTo({top: 0, behavior:'smooth'});
}

function submitTest() {
  const t = TESTS[currentTest];
  let correct = 0;
  t.questions.forEach((q, qi) => {
    const opts = document.querySelectorAll(`#opts-${qi} .option-label`);
    const selected = document.querySelector(`input[name="q${qi}"]:checked`);
    opts.forEach(label => {
      const val = label.querySelector('input').value;
      if (val === q.a) label.classList.add('reveal-correct');
    });
    if (selected) {
      const selLabel = selected.parentElement;
      if (selected.value === q.a) { selLabel.classList.add('correct'); correct++; }
      else selLabel.classList.add('wrong');
    }
    document.querySelectorAll(`input[name="q${qi}"]`).forEach(r => r.disabled = true);
  });
  answered[currentTest] = true;
  scores[currentTest] = correct;
  renderGrid();
  const total = t.questions.length;
  const pct = Math.round((correct/total)*100);
  let msg = pct >= 80 ? '🏆 Odlično! Veoma dobro poznavanje gradiva.' :
            pct >= 60 ? '👍 Dobro. Prođi ponovo kroz netačne odgovore.' :
            '📚 Potrebna je dodatna obrada gradiva.';
  document.getElementById('resultBox').innerHTML = `
    <div class="result-box">
      <div class="result-score">${correct}/${total}</div>
      <div class="result-label">${pct}% tačnih odgovora</div>
      <div class="result-msg">${msg}</div>
    </div>`;
}

function resetTest() {
  answered[currentTest] = false;
  scores[currentTest] = null;
  renderGrid();
  renderTest();
}

renderGrid();
renderTest();
</script>
