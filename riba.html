<style>
  :root {

    --correct: #2d6a4f;
    --wrong: #7b2d2d;
    --correct-bg: #d8f3dc;
    --wrong-bg: #f9d0d0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--navy); color: var(--white); font-family: 'Georgia', serif; min-height: 100vh; }

  header {

  .progress-bar-wrap { background: var(--navy2); padding: 10px 24px; border-bottom: 1px solid #1e3a5c; }
  .progress-bar { height: 6px; background: #1e3a5c; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 3px; transition: width 0.4s ease; }

  .container { max-width: 820px; margin: 0 auto; padding: 28px 20px 60px; }

  .test-selector { margin-bottom: 32px; }
  .test-selector h2 { color: var(--gold); font-size: 1.05rem; margin-bottom: 14px; letter-spacing: 0.03em; }
  .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
  .test-btn {
    background: var(--navy2); border: 1px solid #1e3a5c; color: var(--gray);
    padding: 10px 6px; border-radius: 6px; cursor: pointer; font-size: 0.82rem;
    transition: all 0.2s; text-align: center;
  }
  .test-btn:hover { border-color: var(--gold); color: var(--gold); }
  .test-btn.active { background: var(--gold); color: var(--navy); font-weight: bold; border-color: var(--gold); }
  .test-btn.done { border-color: var(--correct); color: #6fcf97; }

  .question-block { margin-bottom: 28px; }
  .question-num { font-size: 0.75rem; color: var(--gold); letter-spacing: 0.08em; margin-bottom: 6px; }
  .question-text { font-size: 1rem; line-height: 1.6; color: var(--white); margin-bottom: 14px; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-label {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--navy2); border: 1px solid #1e3a5c;
    padding: 11px 14px; border-radius: 7px; cursor: pointer;
    transition: all 0.2s; font-size: 0.93rem; line-height: 1.5;
  }
  .option-label:hover { border-color: var(--gold); }
  .option-label input { accent-color: var(--gold); margin-top: 3px; flex-shrink: 0; }
  .option-label.correct { background: var(--correct-bg); border-color: var(--correct); color: #1a3a2a; }
  .option-label.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: #3a1a1a; }
  .option-label.reveal-correct { background: var(--correct-bg); border-color: var(--correct); color: #1a3a2a; }

  .divider { border: none; border-top: 1px solid #1e3a5c; margin: 32px 0; }

  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 28px; }
  .btn {
    padding: 12px 28px; border-radius: 7px; border: none; cursor: pointer;
    font-size: 0.95rem; font-weight: bold; letter-spacing: 0.03em; transition: all 0.2s;
  }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
  .btn-outline:hover { background: var(--gold); color: var(--navy); }

  .result-box {
    background: var(--navy2); border: 2px solid var(--gold);
    border-radius: 12px; padding: 28px; margin-top: 28px; text-align: center;
  }
  .result-score { font-size: 2.8rem; color: var(--gold); font-weight: bold; margin-bottom: 8px; }
  .result-label { color: var(--gray); font-size: 0.95rem; margin-bottom: 16px; }
  .result-msg { font-size: 1rem; color: var(--white); }
</style>
</head>

</header>

<div class="progress-bar-wrap">

<div class="container">

<script>
const TESTS = [

// ─────────────────────────────────────────────
// TEST 1 – Klasifikacija i karakteristike ribe
// ─────────────────────────────────────────────
{
  title: "Test 1 – Klasifikacija i karakteristike ribe",
  questions: [
    { q:"Prema poreklu, riba se deli na:", options:["a) Morsku i jezersku","b) Slatkovodnu i morsku","c) Rečnu, jezersku i morsku","d) Tropsku i polarnu"], a:"b) Slatkovodnu i morsku" },
    { q:"Prema sadržaju masti, riba se deli na:", options:["a) Mrsnu, polumasnu i nemasnu","b) Masnu i nemasnu","c) Belu i plavu","d) Sveže i zamrznute"], a:"a) Mrsnu, polumasnu i nemasnu" },
    { q:"Nemasna riba sadrži do koliko posto masti:", options:["a) Do 1%","b) Do 2%","c) Do 5%","d) Do 8%"], a:"b) Do 2%" },
    { q:"Koja od sledećih riba spada u masnu ribu (preko 8% masti):", options:["a) Štuka","b) Šaran","c) Skuša","d) Smuđ"], a:"c) Skuša" },
    { q:"Koja od sledećih riba je SLATKOVODNA:", options:["a) Tuna","b) Oslić","c) Som","d) Sardina"], a:"c) Som" },
    { q:"Koja od sledećih riba je MORSKA:", options:["a) Šaran","b) Pastrmka","c) Štuka","d) List"], a:"d) List" },
    { q:"Belančevine ribe smatraju se punovrednim jer:", options:["a) Sadrže sve neophodne aminokiseline","b) Imaju visok sadržaj masti","c) Lako se kuvaju","d) Imaju dug rok trajanja"], a:"a) Sadrže sve neophodne aminokiseline" },
    { q:"Riba je posebno bogata kojim mineralima:", options:["a) Gvožđe i magnezijum","b) Kalijum i natrijum","c) Fosfor, kalijum i jod","d) Kalcijum i cink"], a:"c) Fosfor, kalijum i jod" },
    { q:"Koja vrsta ribe je posebno bogata omega-3 masnim kiselinama:", options:["a) Šaran","b) Smuđ","c) Losos","d) Štuka"], a:"c) Losos" },
    { q:"Meso ribe se od mesa stoke razlikuje po:", options:["a) Višem sadržaju ugljenih hidrata","b) Kraćem vremenu termičke obrade i lakšoj svarljivosti","c) Višem sadržaju kalcijuma","d) Tvrđoj strukturi vezivnog tkiva"], a:"b) Kraćem vremenu termičke obrade i lakšoj svarljivosti" },
    { q:"Pastrmka pripada grupi:", options:["a) Morske masne ribe","b) Slatkovodne nemasne ribe","c) Slatkovodne polumasne ribe","d) Morske nemasne ribe"], a:"c) Slatkovodne polumasne ribe" },
    { q:"Sardina i inćun su primer:", options:["a) Slatkovodne nemasne ribe","b) Morske masne ribe male veličine","c) Morske nemasne ribe","d) Polumasne slatkovodne ribe"], a:"b) Morske masne ribe male veličine" },
    { q:"Tuna pripada grupi:", options:["a) Slatkovodne ribe","b) Polumasne morske ribe","c) Masne morske ribe","d) Nemasne morske ribe"], a:"c) Masne morske ribe" },
    { q:"Koji od navedenih parametara NIJE kriterijum za klasifikaciju ribe:", options:["a) Poreklo (morska/slatkovodna)","b) Sadržaj masti","c) Boja koštiju","d) Način upotrebe (sveža, zamrznuta, prerađena)"], a:"c) Boja koštiju" },
    { q:"Koja riba je poznata kao 'reka slatkovodnih riba' u srpskoj kuhinji:", options:["a) Pastrmka","b) Šaran","c) Losos","d) Oslić"], a:"b) Šaran" },
  ]
},

// ─────────────────────────────────────────────
// TEST 2 – Svežina, čuvanje i priprema ribe
// ─────────────────────────────────────────────
{
  title: "Test 2 – Svežina, čuvanje i priprema ribe",
  questions: [
    { q:"Koji je PRVI znak svežine ribe koji se vizuelno proverava:", options:["a) Boja peraja","b) Boja škrga – treba da su crvene do tamnorvene","c) Miris repa","d) Tekstura ljuski"], a:"b) Boja škrga – treba da su crvene do tamnorvene" },
    { q:"Sveža riba se od pokvarene razlikuje i po:", options:["a) Providnim, sjajnim očima i čvrstom mesom","b) Mutnim, udubljenim očima i mesom koje se odvaja od kostiju","c) Crnim škrgama i mekom mesom","d) Odgovori b) i c) su znaci svežine"], a:"a) Providnim, sjajnim očima i čvrstom mesom" },
    { q:"Na kojoj temperaturi se čuva sveža riba u frižideru:", options:["a) 0°C do +2°C","b) +4°C do +6°C","c) +8°C do +10°C","d) -5°C do -8°C"], a:"a) 0°C do +2°C" },
    { q:"Zamrznuta riba se čuva na temperaturi:", options:["a) -5°C","b) -10°C","c) -18°C ili niže","d) -25°C ili niže"], a:"c) -18°C ili niže" },
    { q:"Odmrzavanje ribe vrši se pravilno:", options:["a) U toploj vodi","b) Na sobnoj temperaturi","c) U frižideru ili pod hladnom tekućom vodom","d) U mikrotalasnoj na visokoj temperaturi"], a:"c) U frižideru ili pod hladnom tekućom vodom" },
    { q:"Sitnija riba (100–200 g) kuva se u vrućoj vodi:", options:["a) 5–7 minuta","b) 10–12 minuta","c) 20–25 minuta","d) 30 minuta"], a:"b) 10–12 minuta" },
    { q:"Krupna riba do 2 kg kuva se:", options:["a) 15–20 minuta","b) 25–30 minuta","c) 40 minuta","d) 60 minuta"], a:"c) 40 minuta" },
    { q:"Riba se NIKAD ne stavlja u:", options:["a) Hladnu vodu za kuvanje","b) Ključalu vodu za kuvanje","c) Vodu sa limunom","d) Vodu sa lovorovim listom"], a:"b) Ključalu vodu za kuvanje" },
    { q:"Koji začin/dodatak se NAJČEŠĆE koristi uz ribu tokom kuvanja:", options:["a) Timijan i lovor","b) Limun, peršun i beli luk","c) Bosiljak i origano","d) Karanfilić i cimet"], a:"b) Limun, peršun i beli luk" },
    { q:"Ljuspanje ribe vrši se:", options:["a) Od repa prema glavi","b) Od glave prema repu","c) Kružnim pokretima","d) Nije bitno u kom smeru"], a:"a) Od repa prema glavi" },
    { q:"Pre prženja riba se:", options:["a) Marinira 24 sata u ulju","b) Posoli, pobrašni ili uvalja u prezle","c) Kuva kratko u vodi","d) Zamrzava"], a:"b) Posoli, pobrašni ili uvalja u prezle" },
    { q:"Koji način termičke obrade je najtipičniji za celu malu ribu (npr. pastrmku):", options:["a) Dinstanje","b) Barenje","c) Pečenje u rerni ili na roštilju","d) Dimljenje"], a:"c) Pečenje u rerni ili na roštilju" },
    { q:"Riblji fond (court-bouillon) kuva se:", options:["a) 15 minuta","b) 30 minuta","c) 45 minuta","d) 90 minuta"], a:"c) 45 minuta" },
    { q:"Koji deo ribe se KORISTI za pravljenje ribljeg fonda:", options:["a) Samo riblje meso","b) Glava, kosti, peraja i koža","c) Samo jetra i unutrašnjosti","d) Isključivo rep"], a:"b) Glava, kosti, peraja i koža" },
    { q:"Panirano pržena riba (npr. bečki stil) prži se na temperaturi ulja:", options:["a) 120–130°C","b) 150–160°C","c) 170–180°C","d) 200°C"], a:"c) 170–180°C" },
  ]
},

// ─────────────────────────────────────────────
// TEST 3 – Mekušci (školjke i glavonošci)
// ─────────────────────────────────────────────
{
  title: "Test 3 – Mekušci",
  questions: [
    { q:"Mekušci se dele na:", options:["a) Školjke i rakove","b) Jednokućne (gastropode), dvokućne (lamelibranhije) i glavonošce","c) Morske i slatkovodne","d) Masne i nemasne"], a:"b) Jednokućne (gastropode), dvokućne (lamelibranhije) i glavonošce" },
    { q:"Koji od sledećih pripada grupi DVOKUĆNIH mekušaca:", options:["a) Hobotnica","b) Lignja","c) Ostriga","d) Puževi (escargot)"], a:"c) Ostriga" },
    { q:"Koji od sledećih pripada grupi JEDNOKUĆNIH mekušaca:", options:["a) Dagnje","b) Kapice","c) Puž vinogradski (escargot)","d) Sipa"], a:"c) Puž vinogradski (escargot)" },
    { q:"Koji od sledećih pripada grupi GLAVONOŽACA:", options:["a) Ostriga","b) Dagnja","c) Hobotnica","d) Kapica"], a:"c) Hobotnica" },
    { q:"Ostrige se u gastronomiji NAJČEŠĆE poslužuju:", options:["a) Kuvane u supi","b) Sveže sirove na ledu sa limunom","c) Pržene u dubokom ulju","d) Dimljene"], a:"b) Sveže sirove na ledu sa limunom" },
    { q:"Dagnje (Mytilus) se pre kuvanja obavezno:", options:["a) Mariniraju 24 sata","b) Čiste i proveravaju – odbacuju se otvorene koje se ne zatvaraju na dodir","c) Zamrzavaju minimum 2 sata","d) Kuvaju sirove bez prethodne pripreme"], a:"b) Čiste i proveravaju – odbacuju se otvorene koje se ne zatvaraju na dodir" },
    { q:"Lignja (Loligo) se u gastronomiji priprema:", options:["a) Isključivo kuvanjem","b) Na više načina – pržena, na žaru, punjena, u sosu","c) Isključivo sirovom","d) Isključivo dimljena"], a:"b) Na više načina – pržena, na žaru, punjena, u sosu" },
    { q:"Sipa je poznata po tome što poseduje:", options:["a) Spoljašnju ljušturu","b) Kesu sa crnim mastilom koje se koristi u kuhinji","c) Otrovne pipke","d) Tvrdu kičmu"], a:"b) Kesu sa crnim mastilom koje se koristi u kuhinji" },
    { q:"Crno mastilo sipe koristi se u gastronomiji za:", options:["a) Bojenje tanjira","b) Pripremu crnog rižota i crnih testenina","c) Mariniranje mesa","d) Pripremu sosova za meso"], a:"b) Pripremu crnog rižota i crnih testenina" },
    { q:"Hobotnica se pre kuvanja obično:", options:["a) Odmah baci u ključalu vodu","b) Tuče o kamen ili se zamrzava radi omekšavanja mišića","c) Marinira u crnom vinu 1 sat","d) Ljušti kao rakovi"], a:"b) Tuče o kamen ili se zamrzava radi omekšavanja mišića" },
    { q:"Svežina mekušaca (školjki) proverava se na sledeći način:", options:["a) Njuhanjem – treba da mirišu na morsku vodu","b) Otvorene školjke treba da se zatvore na dodir; ako ne – odbacuju se","c) Proveravanjem boje ljušture","d) Merenjem težine"], a:"b) Otvorene školjke treba da se zatvore na dodir; ako ne – odbacuju se" },
    { q:"Na kojoj temperaturi se čuvaju žive školjke:", options:["a) Na sobnoj temperaturi","b) Na 0°C do +4°C","c) Zamrznute na -18°C","d) Na +10°C"], a:"b) Na 0°C do +4°C" },
    { q:"Kapice (Pecten jacobaeus / Saint Jacques) su posebno cenjene jer:", options:["a) Imaju crvenu boju mesa","b) Imaju slatko, nežno meso koje se brzo priprema","c) Sadrže 40% proteina","d) Mogu se jesti samo kuvane"], a:"b) Imaju slatko, nežno meso koje se brzo priprema" },
    { q:"Puž vinogradski (Helix pomatia) u gastronomiji se priprema:", options:["a) Sirov na ledu","b) Klasično – kuvani i vraćeni u ljušturu sa puterom, belim lukom i peršunom","c) Isključivo prženi u dubokom ulju","d) Dimljeni"], a:"b) Klasično – kuvani i vraćeni u ljušturu sa puterom, belim lukom i peršunom" },
    { q:"Koji mekušac NEMA školjku ni ljušturu:", options:["a) Ostriga","b) Dagnja","c) Hobotnica","d) Kapica"], a:"c) Hobotnica" },
  ]
},

// ─────────────────────────────────────────────
// TEST 4 – Rakovi (Crustacea)
// ─────────────────────────────────────────────
{
  title: "Test 4 – Rakovi (Crustacea)",
  questions: [
    { q:"Rakovi se u gastronomiji dele na:", options:["a) Morske i slatkovodne","b) Masne i nemasne","c) Meke i tvrde","d) Crvene i zelene"], a:"a) Morske i slatkovodne" },
    { q:"Koji od sledećih spada u MORSKE rakove:", options:["a) Slatkovodni rak","b) Jastog","c) Potočni rak","d) Riječni rak"], a:"b) Jastog" },
    { q:"Koji od sledećih spada u SLATKOVODNE rakove:", options:["a) Škamp","b) Jastog","c) Potočni rak (rečni rak)","d) Kozica (morski račić)"], a:"c) Potočni rak (rečni rak)" },
    { q:"Jastog (Homarus) se kuva:", options:["a) U hladnoj vodi – polako se zagrevá","b) Baci se živ u jako ključalu posoljenu vodu","c) Prvo se zamrzne, pa se kuva","d) Priprema isključivo na pari"], a:"b) Baci se živ u jako ključalu posoljenu vodu" },
    { q:"Meso jastoga je posebno cenjeno jer:", options:["a) Sadrži visok procenat ugljenih hidrata","b) Ima nežan, specifičan ukus i visok sadržaj proteina","c) Ima visok sadržaj masti","d) Lako se odvaja od oklopa"], a:"b) Ima nežan, specifičan ukus i visok sadržaj proteina" },

    { q:"Kuvani rak je SVEŽ ako:", options:["a) Rep je opušten i lako se savija","b) Rep je uvijen pod telo i čvrst","c) Oklop je zelen","d) Meso se odvaja od oklopa"], a:"b) Rep je uvijen pod telo i čvrst" },

},

// ─────────────────────────────────────────────

    { q:"Koji od sledećih NIJE rak:", options:["a) Škamp","b) Kozica","c) Langusta","d) Sipa"], a:"d) Sipa" },
    { q:"Plodovi mora (fruits de mer) su pojam koji obuhvata:", options:["a) Isključivo ribu","b) Morske rakove i mekušce (školjke, glavonošce)","c) Slatkovodnu ribu i rakove","d) Samo školjke"], a:"b) Morske rakove i mekušce (školjke, glavonošce)" },
    { q:"Koji od sledećih proizvoda nastaje preradom ribe:", options:["a) Surimi (imitacija rakova od ribljeg mesa)","b) Tofu","c) Tempeh","d) Miso"], a:"a) Surimi (imitacija rakova od ribljeg mesa)" },
    { q:"Kavijar je:", options:["a) Ikra morskih rakova","b) Soljena ikra jesetarskih riba","c) Prerađeno riblje meso u konzervi","d) Vrsta morske alge"], a:"b) Soljena ikra jesetarskih riba" },
    { q:"Jesetre su posebno vredna riba jer:", options:["a) Imaju belo meso bogato mastima","b) Daju kavijar i njihovo meso je cenjeno","c) Žive u slatkoj i morskoj vodi","d) Svi odgovori su tačni"], a:"d) Svi odgovori su tačni" },
    { q:"Koje od sledećih jela je KLASIČNO jelo od ribe u srpskoj kuhinji:", options:["a) Bouillabaisse","b) Riblja čorba","c) Paella","d) Ceviche"], a:"b) Riblja čorba" },
    { q:"Bouillabaisse je:", options:["a) Srpska riblja čorba","b) Italijanski rižoto s plodovima mora","c) Provansalska riblja čorba/variva s morskim plodovima","d) Špansko jelo s pirinčem i škampima"], a:"c) Provansalska riblja čorba/variva s morskim plodovima" },
    { q:"Paella je:", options:["a) Italijansko jelo od testenine s ribom","b) Špansko jelo od pirinča s morskim plodovima, mesom i povrćem","c) Grčko jelo od hobotnice","d) Francuska riba sa sosom"], a:"b) Špansko jelo od pirinča s morskim plodovima, mesom i povrćem" },
    { q:"Koje je pravilo pri servisu ribe na tanjiru:", options:["a) Glava je uvek okrenuta prema gostu","b) Riba se servira na levoj strani tanjira","c) Glava se uklanja pre servisa","d) Nema posebnih pravila"], a:"a) Glava je uvek okrenuta prema gostu" },
    { q:"Koji pribor se koristi za jelo ribe:", options:["a) Nož i viljuška kao i za meso","b) Specijalni nož za ribu (tupiji, lopatičast) i viljuška za ribu","c) Kašika i viljuška","d) Štapići"], a:"b) Specijalni nož za ribu (tupiji, lopatičast) i viljuška za ribu" },
    { q:"Uz koja vina se TIPIČNO poslužuju riba i plodovi mora:", options:["a) Crna vina sobne temperature","b) Slatka desertna vina","c) Bela suvá ili roze vina, lagano rashlađena","d) Vino nije potrebno uz ribu"], a:"c) Bela suvá ili roze vina, lagano rashlađena" },
    { q:"HACCP princip kod ribe podrazumeva pre svega:", options:["a) Čuvanje na odgovarajućoj temperaturi i sprečavanje unakrsne kontaminacije","b) Kupovinu samo domaće ribe","c) Isključivo zamrzavanje","d) Uvek kuvanje u slanoj vodi"], a:"a) Čuvanje na odgovarajućoj temperaturi i sprečavanje unakrsne kontaminacije" },
    { q:"Koliko kalorija ima riba u poređenju sa mesom stoke:", options:["a) Više kalorija","b) Isti broj kalorija","c) Uglavnom manje kalorija","d) Tri puta više kalorija"], a:"c) Uglavnom manje kalorija" },
    { q:"Koji od sledećih morskih plodova se JEDINI može jesti živ i sirov bez termičke obrade:", options:["a) Hobotnica","b) Škamp","c) Ostriga i neke vrste dagnji","d) Lignja"], a:"c) Ostriga i neke vrste dagnji" },
  ]
}

];

// ── State ──
let currentTest = 0;
let answered = new Array(TESTS.length).fill(false);
let scores = new Array(TESTS.length).fill(null);

// ── Render test grid ──
function renderGrid() {
  const grid = document.getElementById('testGrid');
  grid.innerHTML = '';
  TESTS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'test-btn' + (i === currentTest ? ' active' : '') + (answered[i] ? ' done' : '');
    btn.textContent = `Test ${i+1}`;
    btn.onclick = () => { currentTest = i; renderGrid(); renderTest(); };
    grid.appendChild(btn);
  });
  document.getElementById('progressLabel').textContent = `Test ${currentTest+1} od ${TESTS.length}`;
  const pct = ((currentTest) / TESTS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ── Render questions ──
function renderTest() {
  const t = TESTS[currentTest];
  const area = document.getElementById('testArea');
  let html = `<h2 style="color:var(--gold);font-size:1.1rem;margin-bottom:24px;letter-spacing:0.03em">${t.title}</h2>`;
  t.questions.forEach((q, qi) => {
    html += `<div class="question-block" id="qblock-${qi}">
      <div class="question-num">PITANJE ${qi+1} OD ${t.questions.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options" id="opts-${qi}">`;
    q.options.forEach((opt, oi) => {
      html += `<label class="option-label" id="opt-${qi}-${oi}">
        <input type="radio" name="q${qi}" value="${opt}"> ${opt}
      </label>`;
    });
    html += `</div></div><hr class="divider">`;
  });
  html += `<div class="btn-row">
    <button class="btn btn-gold" onclick="submitTest()">Proveri odgovore</button>
    <button class="btn btn-outline" onclick="resetTest()">Resetuj test</button>
  </div>
  <div id="resultBox"></div>`;
  area.innerHTML = html;
  window.scrollTo({top: 0, behavior:'smooth'});
}

function submitTest() {
  const t = TESTS[currentTest];
  let correct = 0;
  t.questions.forEach((q, qi) => {
    const opts = document.querySelectorAll(`#opts-${qi} .option-label`);
    const selected = document.querySelector(`input[name="q${qi}"]:checked`);
    opts.forEach(label => {
      const val = label.querySelector('input').value;
      if (val === q.a) label.classList.add('reveal-correct');
    });
    if (selected) {
      const selLabel = selected.parentElement;
      if (selected.value === q.a) { selLabel.classList.add('correct'); correct++; }
      else selLabel.classList.add('wrong');
    }
    // disable
    document.querySelectorAll(`input[name="q${qi}"]`).forEach(r => r.disabled = true);
  });

  answered[currentTest] = true;
  scores[currentTest] = correct;
  renderGrid();

  const total = t.questions.length;
  const pct = Math.round((correct/total)*100);
  let msg = pct >= 80 ? '🏆 Odlično! Veoma dobro poznavanje gradiva.' :
            pct >= 60 ? '👍 Dobro. Prođi ponovo kroz netačne odgovore.' :
            '📚 Potrebna je dodatna obrada gradiva.';
  document.getElementById('resultBox').innerHTML = `
    <div class="result-box">
      <div class="result-score">${correct}/${total}</div>
      <div class="result-label">${pct}% tačnih odgovora</div>
      <div class="result-msg">${msg}</div>
    </div>`;
}

function resetTest() {
  answered[currentTest] = false;
  scores[currentTest] = null;
  renderGrid();
  renderTest();
}

// Init
renderGrid();
renderTest();
</script>
</body>
</html>
